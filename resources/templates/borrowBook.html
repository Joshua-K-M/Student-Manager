<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Borrow Book</title>
</head>
<body style="background-image:url('libimg.jpg'); background-size: cover; background-position: center 100px;background-repeat: no-repeat; padding-top: 100px;">
<div style="text-align: center;">
<h1 align="center">  Borrow Book By ID </h1>
<form th:action="@{/borrowing}" method="post">
<input type="number" name="bookID" oninput="this.value=this.value.replace(/[^0-9]/g)" id="bookID" placeholder="Book ID. Numbers only " required>
<input type="number" name="memberID" oninput="this.value=this.value.replace(/[^0-9]/g)" id="memberID" placeholder="Member ID. Numbers only " required>
<input type="text" name="borrowDate" id="borrowDate" placeholder="borrowDate" required>
<input type="text" name="returnDate" id="returnDate" placeholder="returnDate" required>
<button type="submit">Save</button>
</form>
</div>
</body>
</html>
