
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Delete Book By ID</title>
</head>

<body style="background-image:url('book.jpeg'); background-size: cover; background-position: center 100px;background-repeat: no-repeat; paddling-top: 100px;">
<div style="text-align: center;">
<h1 align="center">  Delete Book By ID </h1>
<form th:action="@{/deleting}" method="post">
<input type="number" name="bookID" oninput="this.value=this.value.replace(/[^0-9]/g)" id="bookID" placeholder="Book ID. Numbers only " required>
<button type="submit">Save</button>
</form>
</div>
</body>
</html>
